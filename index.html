<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Tier Ranking</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --daily: #00e676;
    --frequent: #ffd600;
    --limited: #ff6d00;
    --rare: #ff1744;
    --bg: #080810;
    --surface: #0f0f1a;
    --card: #141428;
    --border: rgba(255,255,255,0.07);
    --text: #e8e8ff;
    --subtext: #6b6b9a;
    --glow-green: rgba(0,230,118,0.15);
    --glow-yellow: rgba(255,214,0,0.15);
    --glow-orange: rgba(255,109,0,0.15);
    --glow-red: rgba(255,23,68,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Cairo', sans-serif;
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 9:16 Container */
  .phone-frame {
    width: min(430px, 100vw);
    height: min(932px, 100vh);
    position: relative;
    overflow: hidden;
    background: var(--bg);
    display: flex;
    flex-direction: column;
  }

  /* TOP HALF: Camera Space */
  .camera-zone {
    height: 42%;
    width: 100%;
    background: linear-gradient(180deg, #000000 0%, #05050f 60%, #080810 100%);
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .camera-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse 60% 40% at 50% 30%, rgba(0,191,255,0.04) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px);
    pointer-events: none;
  }

  .camera-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0.35;
    pointer-events: none;
  }

  .camera-icon {
    width: 44px;
    height: 44px;
    border: 2px dashed rgba(255,255,255,0.25);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .camera-text {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    font-weight: 600;
  }

  /* Divider line with glow */
  .divider {
    height: 2px;
    background: linear-gradient(90deg, transparent, #00bfff, #00ff88, #00bfff, transparent);
    box-shadow: 0 0 20px rgba(0,255,136,0.4), 0 0 40px rgba(0,191,255,0.2);
    flex-shrink: 0;
    position: relative;
  }

  .divider::after {
    content: '▼ FOOD TIER ▼';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    background: var(--bg);
    padding: 0 12px;
    font-size: 9px;
    letter-spacing: 3px;
    color: #00ff88;
    font-weight: 700;
    white-space: nowrap;
  }

  /* BOTTOM HALF: App */
  .app-zone {
    height: 58%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  /* Header */
  .app-header {
    padding: 10px 14px 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .app-title {
    font-size: 14px;
    font-weight: 900;
    background: linear-gradient(135deg, #00ff88, #00bfff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 0.5px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,51,102,0.15);
    border: 1px solid rgba(255,51,102,0.3);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 10px;
    font-weight: 700;
    color: var(--never);
    letter-spacing: 1px;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    background: var(--never);
    border-radius: 50%;
    animation: pulse 1.2s ease-in-out infinite;
    box-shadow: 0 0 8px var(--never);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* Tier lanes */
  .tiers-container {
    flex: 1;
    overflow-y: auto;
    padding: 4px 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    scrollbar-width: none;
  }

  .tiers-container::-webkit-scrollbar { display: none; }

  .tier-lane {
    display: flex;
    align-items: center;
    gap: 6px;
    min-height: 48px;
    border-radius: 10px;
    padding: 5px 8px;
    border: 1px solid transparent;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .tier-lane.drag-over {
    transform: scale(1.01);
    border-color: rgba(255,255,255,0.2);
  }

  .tier-lane[data-tier="daily"]    { background: rgba(0,230,118,0.06);  border-color: rgba(0,230,118,0.15); }
  .tier-lane[data-tier="frequent"] { background: rgba(255,214,0,0.06);  border-color: rgba(255,214,0,0.15); }
  .tier-lane[data-tier="limited"]  { background: rgba(255,109,0,0.06);  border-color: rgba(255,109,0,0.15); }
  .tier-lane[data-tier="rare"]     { background: rgba(255,23,68,0.06);  border-color: rgba(255,23,68,0.15); }

  .tier-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 44px;
    flex-shrink: 0;
  }

  .tier-emoji { font-size: 14px; line-height: 1; }

  .tier-name {
    font-size: 8.5px;
    font-weight: 700;
    margin-top: 2px;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .tier-lane[data-tier="daily"]    .tier-name { color: var(--daily); }
  .tier-lane[data-tier="frequent"] .tier-name { color: var(--frequent); }
  .tier-lane[data-tier="limited"]  .tier-name { color: var(--limited); }
  .tier-lane[data-tier="rare"]     .tier-name { color: var(--rare); }

  .tier-sep {
    width: 1px;
    height: 36px;
    flex-shrink: 0;
    opacity: 0.3;
    border-radius: 2px;
  }

  .tier-lane[data-tier="daily"]    .tier-sep { background: var(--daily); }
  .tier-lane[data-tier="frequent"] .tier-sep { background: var(--frequent); }
  .tier-lane[data-tier="limited"]  .tier-sep { background: var(--limited); }
  .tier-lane[data-tier="rare"]     .tier-sep { background: var(--rare); }

  .tier-items {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    flex: 1;
    min-height: 36px;
    align-content: flex-start;
  }

  .tier-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(255,255,255,0.06);
    border-radius: 8px;
    padding: 4px 6px;
    cursor: pointer;
    transition: all 0.2s ease;
    border: 1px solid rgba(255,255,255,0.08);
    min-width: 40px;
    animation: itemIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes itemIn {
    from { opacity: 0; transform: scale(0.5) rotate(-10deg); }
    to   { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  .tier-item:hover {
    transform: scale(1.08);
    background: rgba(255,255,255,0.1);
    z-index: 10;
  }

  .tier-item img {
    width: 22px;
    height: 22px;
    object-fit: cover;
    border-radius: 4px;
  }

  .tier-item-emoji { font-size: 18px; line-height: 1; }

  .tier-item-name {
    font-size: 7.5px;
    color: rgba(255,255,255,0.7);
    margin-top: 2px;
    text-align: center;
    max-width: 40px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }

  /* Food Queue */
  .queue-section {
    flex-shrink: 0;
    padding: 6px 10px 8px;
    border-top: 1px solid var(--border);
    background: rgba(0,0,0,0.3);
  }

  .queue-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .queue-title {
    font-size: 9px;
    color: var(--subtext);
    font-weight: 700;
    letter-spacing: 1.5px;
  }

  .queue-count {
    font-size: 9px;
    color: var(--subtext);
  }

  .queue-scroll {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }

  .queue-scroll::-webkit-scrollbar { display: none; }

  .food-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 7px 8px;
    cursor: pointer;
    transition: all 0.25s ease;
    min-width: 56px;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .food-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.03), transparent);
    pointer-events: none;
  }

  .food-card:hover {
    transform: translateY(-3px) scale(1.05);
    border-color: rgba(0,255,136,0.3);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4), 0 0 15px rgba(0,255,136,0.1);
  }

  .food-card.selected {
    border-color: rgba(0,255,136,0.6);
    box-shadow: 0 0 20px rgba(0,255,136,0.25);
    transform: translateY(-4px) scale(1.08);
  }

  .food-emoji { font-size: 22px; line-height: 1; }

  .food-name {
    font-size: 8px;
    margin-top: 3px;
    color: rgba(255,255,255,0.65);
    text-align: center;
    max-width: 52px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }

  /* Popup Menu */
  .popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }

  .popup-overlay.active {
    opacity: 1;
    pointer-events: all;
  }

  .popup-card {
    background: #13131f;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px 20px 0 0;
    padding: 16px;
    width: 100%;
    max-width: 430px;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
  }

  .popup-overlay.active .popup-card {
    transform: translateY(0);
  }

  .popup-food-preview {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .popup-emoji { font-size: 36px; }

  .popup-food-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }

  .popup-food-sub {
    font-size: 11px;
    color: var(--subtext);
    margin-top: 2px;
  }

  .popup-title {
    font-size: 11px;
    color: var(--subtext);
    margin-bottom: 10px;
    letter-spacing: 1.5px;
    font-weight: 700;
  }

  .tier-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .tier-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid transparent;
    cursor: pointer;
    background: rgba(255,255,255,0.04);
    transition: all 0.2s ease;
    font-family: 'Cairo', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--text);
  }

  .tier-btn:hover { transform: scale(1.03); }

  .tier-btn[data-t="daily"]    { border-color: rgba(0,230,118,0.25);  }
  .tier-btn[data-t="frequent"] { border-color: rgba(255,214,0,0.25);  }
  .tier-btn[data-t="limited"]  { border-color: rgba(255,109,0,0.25);  }
  .tier-btn[data-t="rare"]     { border-color: rgba(255,23,68,0.25); grid-column: 1 / -1; }

  .tier-btn[data-t="daily"]:hover    { background: rgba(0,230,118,0.12);  box-shadow: 0 0 15px rgba(0,230,118,0.15); }
  .tier-btn[data-t="frequent"]:hover { background: rgba(255,214,0,0.12);  box-shadow: 0 0 15px rgba(255,214,0,0.15); }
  .tier-btn[data-t="limited"]:hover  { background: rgba(255,109,0,0.12);  box-shadow: 0 0 15px rgba(255,109,0,0.15); }
  .tier-btn[data-t="rare"]:hover     { background: rgba(255,23,68,0.12);  box-shadow: 0 0 15px rgba(255,23,68,0.15); }

  .tier-btn-icon { font-size: 16px; }

  .tier-btn-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-right: auto;
  }

  .tier-btn[data-t="daily"]    .tier-btn-dot { background: var(--daily);    box-shadow: 0 0 6px var(--daily); }
  .tier-btn[data-t="frequent"] .tier-btn-dot { background: var(--frequent); box-shadow: 0 0 6px var(--frequent); }
  .tier-btn[data-t="limited"]  .tier-btn-dot { background: var(--limited);  box-shadow: 0 0 6px var(--limited); }
  .tier-btn[data-t="rare"]     .tier-btn-dot { background: var(--rare);     box-shadow: 0 0 6px var(--rare); }

  /* Particle burst */
  .particle {
    position: fixed;
    pointer-events: none;
    z-index: 200;
    border-radius: 50%;
    animation: burst 0.8s ease-out forwards;
  }

  @keyframes burst {
    0%   { transform: scale(1) translate(0, 0); opacity: 1; }
    100% { transform: scale(0) translate(var(--dx), var(--dy)); opacity: 0; }
  }

  /* Empty lane hint */
  .empty-hint {
    font-size: 9px;
    color: rgba(255,255,255,0.12);
    font-style: italic;
    align-self: center;
  }

  /* Floating neon lines bg */
  .bg-lines {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }

  .bg-line {
    position: absolute;
    width: 1px;
    background: linear-gradient(180deg, transparent, rgba(0,255,136,0.08), transparent);
    animation: lineFloat linear infinite;
  }

  @keyframes lineFloat {
    from { transform: translateY(-100%); }
    to   { transform: translateY(100vh); }
  }

  .phone-frame { z-index: 1; }
</style>
</head>

<div class="bg-lines" id="bgLines"></div>

<div class="phone-frame">

  <!-- TOP: Camera Zone -->
  <div class="camera-zone">
    <div class="camera-label">
      <div class="camera-icon">📷</div>
      <div class="camera-text">CAMERA ZONE</div>
    </div>

  <!-- BOTTOM: App -->
  <div class="app-zone">
    <div class="app-header">
      <span class="app-title">🏆 Food Tier Ranking</span>

    </div>

    <!-- Tier Lanes -->
    <div class="tiers-container" id="tiersContainer">
      <div class="tier-lane" data-tier="daily"    ondragover="onDragOver(event)" ondrop="onDrop(event,'daily')">
        <div class="tier-label"><span class="tier-emoji">🟢</span><span class="tier-name">استهلاك يومي</span></div>
        <div class="tier-sep"></div>
        <div class="tier-items" id="lane-daily"><span class="empty-hint">اسحب هنا...</span></div>
      </div>
      <div class="tier-lane" data-tier="frequent" ondragover="onDragOver(event)" ondrop="onDrop(event,'frequent')">
        <div class="tier-label"><span class="tier-emoji">🟡</span><span class="tier-name">استهلاك متكرر</span></div>
        <div class="tier-sep"></div>
        <div class="tier-items" id="lane-frequent"><span class="empty-hint">اسحب هنا...</span></div>
      </div>
      <div class="tier-lane" data-tier="limited"  ondragover="onDragOver(event)" ondrop="onDrop(event,'limited')">
        <div class="tier-label"><span class="tier-emoji">🟠</span><span class="tier-name">استهلاك محدود</span></div>
        <div class="tier-sep"></div>
        <div class="tier-items" id="lane-limited"><span class="empty-hint">اسحب هنا...</span></div>
      </div>
      <div class="tier-lane" data-tier="rare"     ondragover="onDragOver(event)" ondrop="onDrop(event,'rare')">
        <div class="tier-label"><span class="tier-emoji">🔴</span><span class="tier-name">استهلاك نادر</span></div>
        <div class="tier-sep"></div>
        <div class="tier-items" id="lane-rare"><span class="empty-hint">اسحب هنا...</span></div>
      </div>
    </div>

    <!-- Food Queue -->
    <div class="queue-section">
      <div class="queue-header">
        <span class="queue-title">📦 المكتبة الغذائية</span>
        <span class="queue-count" id="queueCount"></span>
      </div>
      <div class="queue-scroll" id="foodQueue"></div>
    </div>
  </div>
</div>

<!-- Popup -->
<div class="popup-overlay" id="popupOverlay" onclick="closePopup(event)">
  <div class="popup-card" id="popupCard">
    <div class="popup-food-preview">
      <span class="popup-emoji" id="popupEmoji"></span>
      <div>
        <div class="popup-food-name" id="popupName"></div>
        <div class="popup-food-sub">اختر تصنيف هذا الطعام</div>
      </div>
    </div>
    <div class="popup-title">📊 ضعه في:</div>
    <div class="tier-options">
      <button class="tier-btn" data-t="daily"    onclick="assignTier('daily')">   <span class="tier-btn-icon">🟢</span> استهلاك يومي    <span class="tier-btn-dot"></span></button>
      <button class="tier-btn" data-t="frequent" onclick="assignTier('frequent')"><span class="tier-btn-icon">🟡</span> استهلاك متكرر   <span class="tier-btn-dot"></span></button>
      <button class="tier-btn" data-t="limited"  onclick="assignTier('limited')"> <span class="tier-btn-icon">🟠</span> استهلاك محدود   <span class="tier-btn-dot"></span></button>
      <button class="tier-btn" data-t="rare"     onclick="assignTier('rare')">    <span class="tier-btn-icon">🔴</span> استهلاك نادر    <span class="tier-btn-dot"></span></button>
    </div>
  </div>
</div>

let queue = [...foods];
let selectedFood = null;
let dragFood = null;

function renderQueue() {
  const el = document.getElementById('foodQueue');
  const count = document.getElementById('queueCount');
  el.innerHTML = '';
  count.textContent = queue.length + ' طعام';
  queue.forEach(f => {
    const card = document.createElement('div');
    card.className = 'food-card';
    card.draggable = true;
    card.innerHTML = `<span class="food-emoji">${f.emoji}</span><span class="food-name">${f.name}</span>`;
    card.onclick = () => openPopup(f);
    card.ondragstart = (e) => { dragFood = f; e.dataTransfer.effectAllowed = 'move'; };
    el.appendChild(card);
  });
}

function openPopup(food) {
  selectedFood = food;
  document.getElementById('popupEmoji').textContent = food.emoji;
  document.getElementById('popupName').textContent = food.name;
  document.getElementById('popupOverlay').classList.add('active');
}

function closePopup(e) {
  if (e.target === document.getElementById('popupOverlay')) {
    document.getElementById('popupOverlay').classList.remove('active');
    selectedFood = null;
  }
}

function assignTier(tier) {
  if (!selectedFood) return;
  document.getElementById('popupOverlay').classList.remove('active');
  placeInTier(selectedFood, tier);
  queue = queue.filter(f => f.id !== selectedFood.id);
  selectedFood = null;
  renderQueue();
  setTimeout(() => {}, 50);
}

function placeInTier(food, tier) {
  const lane = document.getElementById('lane-' + tier);
  // Remove empty hint
  const hint = lane.querySelector('.empty-hint');
  if (hint) hint.remove();

  const item = document.createElement('div');
  item.className = 'tier-item';
  item.draggable = true;
  item.dataset.id = food.id;
  item.innerHTML = `<span class="tier-item-emoji">${food.emoji}</span><span class="tier-item-name">${food.name}</span>`;
  item.ondragstart = (e) => {
    dragFood = food;
    e.dataTransfer.effectAllowed = 'move';
    // Mark as coming from tier
    dragFood._fromTier = tier;
    setTimeout(() => item.style.opacity = '0.3', 0);
  };
  item.ondragend = () => { item.style.opacity = '1'; };
  item.onclick = () => openPopupFromTier(food, tier, item);
  lane.appendChild(item);
  spawnParticles(tier);
}

function openPopupFromTier(food, fromTier, el) {
  selectedFood = food;
  selectedFood._fromTier = fromTier;
  selectedFood._fromEl = el;
  document.getElementById('popupEmoji').textContent = food.emoji;
  document.getElementById('popupName').textContent = food.name;
  document.getElementById('popupOverlay').classList.add('active');
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

document.querySelectorAll('.tier-lane').forEach(lane => {
  lane.addEventListener('dragleave', () => lane.classList.remove('drag-over'));
});

function onDrop(e, tier) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragFood) return;

  if (dragFood._fromTier) {
    const oldLane = document.getElementById('lane-' + dragFood._fromTier);
    const oldItem = oldLane.querySelector(`[data-id="${dragFood.id}"]`);
    if (oldItem) oldItem.remove();
    checkEmptyLane(dragFood._fromTier);
  } else {
    queue = queue.filter(f => f.id !== dragFood.id);
    renderQueue();
  }

  placeInTier(dragFood, tier);
  dragFood = null;
}

function checkEmptyLane(tier) {
  const lane = document.getElementById('lane-' + tier);
  if (!lane.querySelector('.tier-item')) {
    const hint = document.createElement('span');
    hint.className = 'empty-hint';
    hint.textContent = 'اسحب هنا...';
    lane.appendChild(hint);
  }
}

// Re-assign from popup even when item is in tier
const origAssign = window.assignTier;
window.assignTier = function(tier) {
  if (!selectedFood) return;
  document.getElementById('popupOverlay').classList.remove('active');

  if (selectedFood._fromTier) {
    // Remove from old lane
    const oldLane = document.getElementById('lane-' + selectedFood._fromTier);
    const oldItem = oldLane.querySelector(`[data-id="${selectedFood.id}"]`);
    if (oldItem) oldItem.remove();
    checkEmptyLane(selectedFood._fromTier);
    // Place in new lane (only if different)
    if (tier !== selectedFood._fromTier) {
      placeInTier(selectedFood, tier);
    } else {
      placeInTier(selectedFood, tier); // re-add with animation
    }
  } else {
    placeInTier(selectedFood, tier);
    queue = queue.filter(f => f.id !== selectedFood.id);
    renderQueue();
  }

  selectedFood = null;
};

// Particle burst
function spawnParticles(tier) {
  const colors = {
    daily:'#00ff88', weekly:'#ffd700', monthly:'#ff8c00', yearly:'#00bfff', never:'#ff3366'
  };
  const color = colors[tier];
  for (let i = 0; i < 8; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.PI * 2 * i) / 8;
    const dist = 30 + Math.random() * 40;
    p.style.cssText = `
      width:${4+Math.random()*4}px;
      height:${4+Math.random()*4}px;
      background:${color};
      box-shadow:0 0 6px ${color};
      left:50%; top:80%;
      --dx:${Math.cos(angle)*dist}px;
      --dy:${Math.sin(angle)*dist}px;
      animation-duration:${0.5+Math.random()*0.4}s;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}

// BG lines
function buildBgLines() {
  const container = document.getElementById('bgLines');
  for (let i = 0; i < 6; i++) {
    const line = document.createElement('div');
    line.className = 'bg-line';
    const left = 10 + Math.random() * 80;
    const dur = 8 + Math.random() * 10;
    const delay = Math.random() * -10;
    line.style.cssText = `left:${left}%;height:${80+Math.random()*120}px;animation-duration:${dur}s;animation-delay:${delay}s;opacity:${0.3+Math.random()*0.4}`;
    container.appendChild(line);
  }
}

buildBgLines();
renderQueue();
